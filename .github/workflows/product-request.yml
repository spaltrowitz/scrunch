name: Auto-add requested product
on:
  issues:
    types: [opened, labeled]

jobs:
  process-product-request:
    # Only run on issues with 'product-request' label
    if: contains(github.event.issue.labels.*.name, 'product-request')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Assign to Copilot
        uses: actions/github-script@v7
        with:
          script: |
            // Assign Copilot to the issue
            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                assignees: ['copilot']
              });
            } catch (e) {
              console.log('Could not assign copilot:', e.message);
            }

            // Add processing comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🤖 **Scrunch Bot**: Processing this product request!\n\nI'll:\n1. Look up the product details and ingredients\n2. Find a product image\n3. Run CG ingredient analysis\n4. Create a PR to add it to the database\n\nThis usually takes a few minutes.`
            });
